<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard — GymSaaS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<div class="topbar">
    <span class="topbar-brand">🏋️ GymSaaS</span>
    <div class="topbar-right">
        <a href="/logout" class="logout-link">Logout</a>
    </div>
</div>

<div id="app" data-gym-id="{{ session['gym_id'] }}"></div>

<div class="container">

    <!-- STAT CARDS -->
    <div class="stats-grid">
        <div class="stat-card accent-blue">
            <div class="stat-icon">👥</div>
            <div class="stat-label">Total Members</div>
            <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card accent-green">
            <div class="stat-icon">✅</div>
            <div class="stat-label">Active</div>
            <div class="stat-value" id="statActive">—</div>
        </div>
        <div class="stat-card accent-amber">
            <div class="stat-icon">⚠️</div>
            <div class="stat-label">Expiring Soon</div>
            <div class="stat-value" id="statExpiring">—</div>
        </div>
    </div>

    <!-- EXPIRY ALERTS -->
    <div class="card" id="alertsCard" style="display:none;">
        <div class="card-title">⚠️ Expiring in Next 3 Days</div>
        <ul id="alertsList"></ul>
    </div>

    <!-- ADD MEMBER -->
    <div class="card">
        <div class="card-title">➕ Add Member</div>
        <form id="memberForm" enctype="multipart/form-data">
            <div class="form-grid">
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" name="name" placeholder="Full name" required />
                </div>
                <div class="form-group">
                    <label>Phone *</label>
                    <input type="text" name="phone" placeholder="Mobile number" required />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Optional" />
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="Age" min="1" max="120" />
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Membership Plan *</label>
                    <select name="plan_id" id="plan_id" required>
                        <option value="1">Monthly (30 days)</option>
                        <option value="2">3 Months (90 days)</option>
                        <option value="3">6 Months (180 days)</option>
                        <option value="4">12 Months (365 days)</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Address</label>
                    <input type="text" name="address" placeholder="Optional" />
                </div>
                <div class="form-group full">
                    <label>Photo</label>
                    <input type="file" name="photo" accept="image/*" />
                </div>
            </div>
            <div style="margin-top:8px;">
                <button type="submit">Add Member</button>
            </div>
        </form>
        <div id="result"></div>
    </div>

    <!-- CSV UPLOAD -->
    <div class="card">
        <div class="card-title">📂 Bulk Upload via CSV</div>
        <p style="font-size:13px; color:var(--text-3); margin-bottom:14px;">
            Required columns: <code>name, phone, email</code>
        </p>
        <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
            <div class="form-group" style="margin:0;">
                <label>CSV File</label>
                <input type="file" id="csvFile" accept=".csv" style="width:auto;" />
            </div>
            <div class="form-group" style="margin:0;">
                <label>Plan</label>
                <select id="csvPlanId">
                    <option value="1">Monthly (30 days)</option>
                    <option value="2">3 Months (90 days)</option>
                    <option value="3">6 Months (180 days)</option>
                    <option value="4">12 Months (365 days)</option>
                </select>
            </div>
            <button class="btn" onclick="uploadCSV()">Upload</button>
        </div>
        <div id="csvResult"></div>
    </div>

    <!-- MEMBERS TABLE -->
    <div class="card">
        <div class="section-header">
            <div class="card-title">👥 All Members</div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <input type="text" id="searchInput" placeholder="🔍 Search name / phone…"
                       oninput="filterTable()" style="width:210px;" />
                <button class="btn btn-ghost btn-sm" onclick="loadMembers()">🔄 Refresh</button>
            </div>
        </div>
        <div class="table-wrap">
            <table id="membersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Photo</th>
                        <th>Expiry</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="10" style="text-align:center;color:var(--text-3);padding:30px;">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-title">✏️ Edit Member</div>
        <input type="hidden" id="editId" />
        <div class="form-grid">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="editName" />
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="editPhone" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail" />
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="editAge" />
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="editGender">
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="editAddress" />
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeEdit()">Cancel</button>
            <button class="btn" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Gym SaaS</title>
</head>
<body>

<h1>Gym Dashboard</h1>

<h2>Add Member</h2>

<input type="text" id="name" placeholder="Name"><br><br>
<input type="text" id="phone" placeholder="Phone"><br><br>

<button onclick="addMember()">Add Member</button>

<p id="result"></p>

<hr>

<h2>All Members</h2>
<button onclick="loadMembers()">Load Members</button>

<ul id="membersList"></ul>

<!-- ✅ ALL JS GOES HERE -->
<script>

function addMember() {
    fetch("/add-member", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            gym_id: 1,
            plan_id: 1
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            "✅ " + data.message + " | Expiry: " + data.expiry_date;

        loadMembers();  // 🔥 auto refresh list
    });
}


function loadMembers() {
    fetch("/members/1")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("membersList");
        list.innerHTML = "";

        data.forEach(member => {
            let li = document.createElement("li");
            li.innerText =
                member.name + " | " +
                member.phone + " | Expiry: " +
                member.expiry_date;

            list.appendChild(li);
        });
    });
}

</script>

</body>
</html>

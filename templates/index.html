<!doctype html>
<html>
  <head>
    <title>Gym SaaS Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>

  <body>
    <!-- Gym ID for JS -->
    <div id="app" data-gym-id="{{ session['gym_id'] }}"></div>

    <div class="container">

      <!-- Header -->
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>🏋️ Gym Dashboard</h1>
        <a href="/logout" style="background: red; color: white; padding: 8px 16px;
           border-radius: 5px; text-decoration: none; font-weight: bold;">
          Logout
        </a>
      </div>

      <!-- ===================== -->
      <!-- EXPIRY ALERTS -->
      <!-- ===================== -->
      <div class="card">
        <h2>⚠️ Expiring Soon (Next 3 Days)</h2>
        <ul id="alertsList">
          <li>Loading...</li>
        </ul>
      </div>

      <!-- ===================== -->
      <!-- ADD MEMBER -->
      <!-- ===================== -->
      <div class="card">
        <h2>➕ Add Member</h2>

        <form id="memberForm" enctype="multipart/form-data">

          <label>Name *</label>
          <input type="text" name="name" placeholder="Enter name" required />

          <label>Phone *</label>
          <input type="text" name="phone" placeholder="Enter phone" required />

          <label>Email</label>
          <input type="email" name="email" placeholder="Enter email" />

          <label>Age</label>
          <input type="number" name="age" placeholder="Enter age" min="1" max="120" />

          <label>Gender</label>
          <select name="gender">
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>

          <label>Address</label>
          <input type="text" name="address" placeholder="Enter address" />

          <label>Upload Photo</label>
          <input type="file" name="photo" accept="image/*" />

          <label>Membership Plan *</label>
          <select name="plan_id" id="plan_id" required>
            <option value="1">Monthly (30 days)</option>
            <option value="2">3 Months (90 days)</option>
            <option value="3">6 Months (180 days)</option>
            <option value="4">12 Months (365 days)</option>
          </select>

          <button type="submit">Add Member</button>
        </form>

        <p id="result"></p>
      </div>

      <!-- ===================== -->
      <!-- CSV UPLOAD -->
      <!-- ===================== -->
      <div class="card">
        <h2>📂 Upload CSV</h2>
        <p style="color: gray; font-size: 0.9em;">
          CSV must have columns: <code>name, phone, email</code>
        </p>

        <input type="file" id="csvFile" accept=".csv" />

        <label>Membership Plan for CSV Members</label>
        <select id="csvPlanId">
          <option value="1">Monthly (30 days)</option>
          <option value="2">3 Months (90 days)</option>
          <option value="3">6 Months (180 days)</option>
          <option value="4">12 Months (365 days)</option>
        </select>

        <button onclick="uploadCSV()">Upload</button>

        <p id="csvResult"></p>
      </div>

      <!-- ===================== -->
      <!-- MEMBERS LIST -->
      <!-- ===================== -->
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2>👥 All Members</h2>
          <button onclick="loadMembers()">🔄 Refresh</button>
        </div>

        <div style="overflow-x: auto;">
          <table id="membersTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Photo</th>
                <th>Expiry</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="9" style="text-align:center;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>

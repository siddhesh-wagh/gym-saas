<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign Up — GymSaaS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-page">

<div class="auth-card">
    <div class="auth-logo">🏋️ GymSaaS</div>
    <p class="auth-subtitle">Create your gym account — 7 days free trial</p>

    {% if error %}  <div class="error-msg">{{ error }}</div>    {% endif %}
    {% if success %}<div class="success-msg">{{ success }}</div>{% endif %}

    <form method="POST" action="/signup">
        <div class="form-group">
            <label>Gym Name</label>
            <input type="text" name="name" placeholder="e.g. PowerFit Gym"
                   required autofocus/>
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" name="phone" placeholder="10-digit mobile number"
                   pattern="[0-9]{10,13}" required/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password"
                   placeholder="Min. 8 characters" required minlength="8"/>
        </div>

        <button type="submit">Register →</button>
    </form>

    <div class="auth-footer" style="margin-top:16px;">
        <div style="background:var(--surface-2);border:1px solid var(--border);
                    border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;
                    color:var(--text-2);text-align:left;">
            ℹ️ After registration, an admin will review and approve your account.
            You'll be able to log in once approved.
        </div>
    </div>

    <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
    </div>
</div>

</body>
</html>
